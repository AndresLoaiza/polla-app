name: Recordatorios push
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  recordar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polla-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install web-push @supabase/supabase-js
      - run: node scripts/enviar-recordatorios.mjs
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
